version: '3.9'

services:
  # ============================================
  # Core Application
  # ============================================
  selfevolve-core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: selfevolve-core
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"   # Dashboard API
      - "8001:8001"   # Webhook Listener
      - "9090:9090"   # Prometheus metrics endpoint
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./logs:/app/logs
      - ./data/checkpoints:/app/checkpoints
    networks:
      - selfevolve-net
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'

  # ============================================
  # PostgreSQL + TimescaleDB
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: selfevolve-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: selfevolve
      POSTGRES_USER: selfevolve
      POSTGRES_PASSWORD: selfevolve
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./persistence/schemas:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U selfevolve -d selfevolve"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - selfevolve-net

  # ============================================
  # Redis (Hot State + Pub/Sub + Heartbeats)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: selfevolve-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - selfevolve-net

  # ============================================
  # Qdrant Vector Database (Memory/Reflexion)
  # ============================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: selfevolve-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - selfevolve-net

  # ============================================
  # Prometheus (Metrics Collection)
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: selfevolve-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - selfevolve-net

  # ============================================
  # Grafana (Dashboards & Visualization)
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: selfevolve-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: selfevolve
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - selfevolve-net

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  prometheus_data:
  grafana_data:

networks:
  selfevolve-net:
    driver: bridge
